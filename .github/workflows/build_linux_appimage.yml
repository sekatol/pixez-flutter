name: Build Linux AppImage

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    outputs:
      appimage-artifact: ${{ steps.appimage-artifact.outputs.artifact-url }}
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 初始化 GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.4.x'

      - name: 计算版本 Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          overrideConfig: |
            assembly-versioning-scheme=MajorMinorPatchTag
            assembly-file-versioning-format="{Major}.{Minor}.{Patch}.{BuildMetaData ?? 0}"

      - name: 初始化 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: x64

      - name: 初始化 Rust 工具链
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
          flutter config --enable-linux-desktop

      - name: 还原依赖 (rhttp)
        working-directory: plugins/rhttp
        run: flutter pub get --no-example --enforce-lockfile

      - name: 还原依赖 (PixEz)
        run: flutter pub get --no-example --enforce-lockfile

      - name: 生成代码 (rhttp)
        working-directory: plugins/rhttp
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 生成代码 (PixEz)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 构建 Linux 二进制文件
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .
          flutter pub get
          flutter build linux --release \
            --build-name=${{ steps.gitversion.outputs.majorMinorPatch }} \
            --build-number=${{ steps.gitversion.outputs.buildMetaData }}

      - name: 准备 AppDir 目录
        run: |
          mkdir -p AppDir/usr
          cp -r build/linux/x64/release/bundle/* AppDir/usr/
          ln -s usr/bin/pixez AppDir/AppRun

      - name: 生成 AppImageBuilder 配置
        run: |
          cat > AppImageBuilder.yml <<EOF
          version: 1
          script:
            - rm -rf "\$TARGET_APPDIR"
            - mkdir -p "\$TARGET_APPDIR/usr"
            - cp -r build/linux/x64/release/bundle/* "\$TARGET_APPDIR/usr/"
          AppDir:
            path: ./AppDir
            app_info:
              id: com.example.pixez
              name: PixEz
              icon: usr/share/icons/hicolor/256x256/apps/pixez.png
              version: ${{ steps.gitversion.outputs.majorMinorPatch }}
              exec: usr/bin/pixez
              exec_args: "\$@"
            runtime:
              env:
                PATH: "\${APPDIR}/usr/bin:\${PATH}"
                LD_LIBRARY_PATH: "\${APPDIR}/usr/lib:\${LD_LIBRARY_PATH}"
            apt:
              arch:
                - amd64
              sources:
                - sourceline: "deb http://archive.ubuntu.com/ubuntu/ focal main restricted universe multiverse"
                  key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3B4FE6ACC0B21F32"
                - sourceline: "deb http://archive.ubuntu.com/ubuntu/ focal main restricted universe multiverse"
                  key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C"
              include:
                - libc6
                - libstdc++6
                - libgtk-3-0
                - libblkid1
                - liblzma5
                - libssl1.1
              exclude:
                - fdisk
                - libfdisk1
                - libmount1
            files:
              include:
                - usr/lib/x86_64-linux-gnu/libgtk-3.so.0
              exclude:
                - usr/share/man
                - usr/share/doc
          AppImage:
            arch: x86_64
            update-information: guess
          EOF

      - name: 构建 AppImage
        uses: AppImageCrafters/build-appimage-action@v1
        with:
          recipe: AppImageBuilder.yml

      - name: 重命名 AppImage 文件
        run: |
          mv *.AppImage pixez-linux-x86_64-${{ steps.gitversion.outputs.majorMinorPatch }}.AppImage

      - name: 上传产物
        id: appimage-artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-x86_64-release.AppImage
          path: pixez-linux-x86_64-*.AppImage
          compression-level: 0

      - name: 生成校验和及摘要
        shell: bash
        run: |
          sha256sum pixez-linux-x86_64-*.AppImage > pixez-linux-x86_64-${{ steps.gitversion.outputs.majorMinorPatch }}.AppImage.sha256
          echo '### Build Success :rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '|File|SHA256|' >> $GITHUB_STEP_SUMMARY
          echo '|:-|:-:|' >> $GITHUB_STEP_SUMMARY
          echo "|[AppImage](${{ steps.appimage-artifact.outputs.artifact-url }})|$(cat pixez-linux-x86_64-*.AppImage.sha256 | cut -d' ' -f1)|" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '运行方式：`chmod +x *.AppImage && ./pixez-linux-x86_64-*.AppImage`' >> $GITHUB_STEP_SUMMARY

  publish:
    needs: build
    name: 发布
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      discussions: write
    runs-on: ubuntu-latest
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6

      - name: 下载 AppImage Artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-x86_64-release.AppImage
          path: artifacts

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*